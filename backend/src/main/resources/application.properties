spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/bookinghub?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:bookinghub_app}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:bookhub@7}

spring.jpa.hibernate.ddl-auto=validate 
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.error.include-message=always
server.error.include-binding-errors=always

app.upload.dir=uploads
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=45MB

app.seed.admin.enabled=${APP_SEED_ADMIN_ENABLED:true}
app.seed.admin.username=${APP_SEED_ADMIN_USERNAME:admin}
app.seed.admin.email=${APP_SEED_ADMIN_EMAIL:admin@bookinghub.dev}
app.seed.admin.password=${APP_SEED_ADMIN_PASSWORD:Admin12345}
app.seed.disable-dev-users=${APP_SEED_DISABLE_DEV_USERS:true}

app.email.from=${APP_EMAIL_FROM:no-reply@bookinghub.local}
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:3000}
app.support.email=${APP_SUPPORT_EMAIL:bookinghub.support@gmail.com}

spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
